name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate composer metadata
        run: composer validate --no-check-lock --strict

      - name: Lint PHP files
        run: find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate XML files
        run: |
          python3 - <<'PY'
          import pathlib
          import xml.etree.ElementTree as ET

          for path in pathlib.Path('.').rglob('*.xml'):
              ET.parse(path)
              print(f'{path} OK')
          PY
